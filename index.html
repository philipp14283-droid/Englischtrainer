<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercy Ships — English Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#F5F3EE;--surface:#FFF;--border:#D8D4CC;--border-light:#EAE7E0;
            --text:#1A1916;--muted:#7A7670;--faint:#B0ACA5;
            --accent:#2B5F4A;--accent-light:#E8F2EE;
            --hl:#F5C842;--hl-bg:#FDF8E1;
            --de-bg:#F0EEF8;--de-text:#4A3F8A;
            --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
        }
        body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
        .app{max-width:780px;margin:0 auto;padding:36px 20px 80px}
        .logo{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-light);padding:5px 10px;border-radius:4px;display:inline-block;margin-bottom:16px}
        h1{font-size:26px;font-weight:300;letter-spacing:-.02em;margin-bottom:6px}
        h1 span{font-weight:600}
        .sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.5}
        .top-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:32px}
        .btn-gen,.btn-dashboard,.btn-history,.btn-de,.btn-trainer{
            background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px 18px;
            font-size:14px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:background .15s,transform .1s;
            display:flex;align-items:center;gap:8px;
        }
        .btn-gen{background:var(--accent)}
        .btn-gen:hover{background:#234D3C}
        .btn-dashboard{background:#4A3F8A}
        .btn-dashboard:hover{background:#3C3270}
        .btn-history{background:#E8F2EE;color:var(--accent)}
        .btn-history:hover{background:#D0E5DC}
        .btn-de{background:var(--de-bg);color:var(--de-text);border:1px solid #C8C0E8;display:none}
        .btn-de.vis{display:inline-flex}
        .btn-trainer{background:#FFF3E0;color:#8A5A00;border:1px solid #F0C060}
        .btn-trainer:hover{background:#FFEAC0}
        .counter{font-family:var(--mono);font-size:12px;color:var(--faint);text-align:right;margin-bottom:8px}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:fadeIn .4s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .card-head{padding:22px 26px 18px;border-bottom:1px solid var(--border-light);background:#FAFAF8}
        .tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
        .tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent)}
        .tag.loc{background:#FEF3E0;color:#8A5A00}
        .tag.diff{background:#F0EEF8;color:#4A3F8A}
        .card-title{font-size:21px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
        .card-desc{font-size:13.5px;color:var(--muted);line-height:1.55;margin-bottom:14px}
        .sp-row{display:flex;gap:14px;flex-wrap:wrap}
        .sp-chip{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}
        .av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
        .dialogue{padding:24px 26px;display:flex;flex-direction:column;gap:2px}
        .lb{display:flex;gap:12px;padding:9px 0;align-items:flex-start}
        .lb.r{flex-direction:row-reverse}
        .lav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;margin-top:2px}
        .lc{max-width:86%}
        .lb.r .lc{align-items:flex-end}
        .sname{font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
        .lb.r .sname{text-align:right}
        .bub{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:11px 15px;font-size:14px;line-height:1.68;color:var(--text)}
        .lb.r .bub{background:#EDF6F2;border-color:#C5E0D5}
        .bub-de{font-size:12.5px;color:var(--de-text);font-style:italic;margin-top:7px;padding-top:7px;border-top:1px solid #E0DCF0;display:none;line-height:1.5}
        .bub-de.on{display:block}
        mark{background:var(--hl-bg);color:#7A5800;border-bottom:2px solid var(--hl);border-radius:2px;padding:0 2px;font-weight:500}
        .voc-sec{padding:18px 26px 22px;border-top:1px solid var(--border-light);background:#FAFAF8}
        .voc-title{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
        .chips{display:flex;flex-wrap:wrap;gap:6px}
        .chip{font-size:12px;padding:4px 11px;border-radius:20px;background:var(--hl-bg);color:#7A5800;border:1px solid #F0DC90;font-family:var(--mono)}
        .tip{margin-top:14px;padding:11px 15px;background:var(--accent-light);border-radius:8px;font-size:13px;color:var(--accent);line-height:1.5}
        .empty{text-align:center;padding:70px 30px;border:2px dashed var(--border);border-radius:16px;color:var(--muted)}
        .empty-icon{font-size:44px;margin-bottom:14px;opacity:.4}
        .empty-t{font-size:17px;font-weight:500;color:var(--text);margin-bottom:6px}
        .empty-s{font-size:13.5px;line-height:1.6}
        .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
        @media(max-width:600px){.dashboard-grid{grid-template-columns:1fr}}
        .dash-card{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:16px}
        .dash-number{font-size:32px;font-weight:600;color:var(--accent)}
        .dash-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
        .bar-container{background:var(--bg);border-radius:6px;height:8px;width:100%;margin-top:4px}
        .bar-fill{background:var(--accent);height:100%;border-radius:6px}
        .activity-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px}
        .activity-item:last-child{border-bottom:none}
        .streak-fire{font-size:24px;vertical-align:middle}
        .trainer-section{margin-top:40px}
        .trainer-actions{display:flex;gap:10px;flex-wrap:wrap}
        .trainer-btn{
            background:var(--surface);border:2px solid var(--border);border-radius:8px;
            padding:10px 16px;font-size:15px;cursor:pointer;font-family:var(--sans);
            font-weight:500;transition:all .15s;
        }
        .trainer-btn.easy{border-color:var(--accent);color:var(--accent)}
        .trainer-btn.easy:hover{background:var(--accent);color:#fff}
        .trainer-btn.medium{border-color:#C8A700;color:#8A6D00}
        .trainer-btn.medium:hover{background:#FFEEAA}
        .trainer-btn.hard{border-color:#D0893B;color:#9A4D00}
        .trainer-btn.hard:hover{background:#FFE0C0}
        .trainer-btn.again{border-color:#C84B4B;color:#8A0000}
        .trainer-btn.again:hover{background:#FFCCCC}
        .add-scene-btn{
            margin-top:14px;background:var(--hl-bg);border:1px solid #F0DC90;
            border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;
            font-family:var(--sans);color:#7A5800;width:100%
        }
        .add-scene-btn:hover{background:#F0DC90}
    </style>
</head>
<body>
<div class="app">
    <div class="logo">Mercy Ships · English Trainer</div>
    <h1>Situationen <span>üben</span></h1>
    <p class="sub">Jeder Klick eine neue, ausführliche Dialog‑Situation – aus dem echten Schiffsalltag.<br>Gelb markierte Wörter sind Schlüsselvokabeln.</p>

    <div class="top-bar">
        <input type="text" id="customSceneInput" placeholder="z.B. 'Eine Impfaufklärung mit einer nervösen Mutter'"
               style="flex:1;min-width:200px;padding:12px 16px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:14px;background:var(--surface);">
        <button class="btn-gen" id="genBtnCustom">✨ Wunschszene</button>
        <button class="btn-gen" id="genBtn">🎲 Zufällig</button>
        <button class="btn-dashboard" id="dashboardBtn">🏠 Dashboard</button>
        <button class="btn-history" id="historyBtn">🕒 Verlauf</button>
        <button class="btn-de" id="deBtn">🇩🇪 Übersetzung ein/aus</button>
        <button class="btn-trainer" id="vocabBtn">📚 Vokabeltrainer</button>
    </div>
    <div class="counter" id="ctr" style="display:none"></div>
    <div id="out"></div>
    <div id="vocabTrainerSection" class="trainer-section" style="display:none;">
        <div class="card" style="padding:22px 26px;">
            <div class="voc-title" style="margin-bottom:12px;">📚 Vokabeltrainer (Spaced Repetition)</div>
            <div class="trainer-stats" id="trainerStats" style="margin-bottom:16px;font-size:13px;color:var(--muted);"></div>
            <div id="trainerCard" style="display:none;">
                <div style="font-size:28px;font-weight:600;margin:16px 0 8px;color:var(--accent);" id="trainerWord"></div>
                <div style="font-size:14px;color:var(--muted);margin-bottom:20px;" id="trainerContext"></div>
                <div class="trainer-actions">
                    <button class="trainer-btn easy">😊 Leicht</button>
                    <button class="trainer-btn medium">🤔 Mittel</button>
                    <button class="trainer-btn hard">😣 Schwer</button>
                    <button class="trainer-btn again">❌ Vergessen</button>
                </div>
            </div>
            <div id="trainerEmpty" style="text-align:center;padding:24px;color:var(--muted);font-size:14px;">
                Keine Karten fällig. Komm später wieder oder füge neue Vokabeln hinzu!
            </div>
            <button class="add-scene-btn" id="exportMdBtn" style="width:auto;margin-top:12px;">📝 Vokabeln als Markdown exportieren</button>
        </div>
    </div>
</div>
<script>
    /* ═══════════════════════════════════════════════
       KONFIGURATION
       ═══════════════════════════════════════════════ */
    const API_URL = 'https://mercytrainerapi.y68xps2sdk.workers.dev/api/generate';
    let showDE = false, idx = -1, total = 0;
    let currentScene = null;

    /* ═══════════════════════════════════════════════
       LOKALE FALLBACK-SZENEN
       ═══════════════════════════════════════════════ */
    const C = ['#2B5F4A','#4A3F8A','#8A5A00','#2B4A8A','#8A2B4A'];
    const S = [
        {
            cat:"Ankunft",loc:"Reception · Deck 7",diff:"B2",title:"First Day Check-in",
            desc:"Ein neuer Freiwilliger kommt zum ersten Mal an Bord. Die Rezeption führt ihn durch den Anmeldeprozess, Kabinenzuweisung und Einführungswoche.",
            sp:[{n:"Reception Officer — Sarah",i:"SO",r:false},{n:"New Volunteer — Dr. Fischer",i:"DF",r:true}],
            lines:[
                {s:0,en:"Welcome aboard, Dr. Fischer! We have been expecting you. My name is Sarah and I work at the reception desk. Before we get started with the check-in process, could you please hand me your passport, your vaccination record, and your medical clearance document? We also need your signed crew agreement.",de:"Willkommen an Bord, Dr. Fischer! Wir haben Sie erwartet. Mein Name ist Sarah und ich arbeite an der Rezeption. Bevor wir mit dem Check-in-Prozess beginnen, könnten Sie mir bitte Ihren Reisepass, Ihren Impfpass und Ihr medizinisches Freigabedokument geben?",v:["welcome aboard","check-in process","vaccination record","medical clearance document","crew agreement"]},
                {s:1,en:"Of course! Here is my passport — it is valid until 2030. And this is my vaccination record. I have had yellow fever, hepatitis A and B, typhoid, and meningococcal vaccinations, and my COVID-19 vaccination is fully up to date. I also brought my medical license and a letter of good standing from my hospital back home.",de:"Natürlich! Hier ist mein Reisepass. Das ist mein Impfpass — ich habe Gelbfieber, Hepatitis A/B, Typhus und Meningokokken, und meine COVID-19-Impfung ist aktuell. Ich habe auch meine Approbation und eine Unbedenklichkeitsbescheinigung mitgebracht.",v:["vaccination record","yellow fever","hepatitis A and B","medical license","letter of good standing"]}
            ],
            vocab:["welcome aboard","check-in process","vaccination record","medical clearance","crew agreement","next of kin","liability waiver","professional credentials"],
            tip:"'At all times' und 'on board' sind typische Schiffsausdrücke — du wirst sie sehr oft hören."
        },
        {
            cat:"Crew-Klinik",loc:"Crew Clinic · Deck 4",diff:"B2",title:"Sick Crew Member — Suspected Malaria",
            desc:"Ein Crew-Mitglied fühlt sich nach drei Wochen an Bord sehr krank und besucht die Crew-Klinik.",
            sp:[{n:"Ship's Doctor — Dr. Amara",i:"DA",r:false},{n:"Crew Member — Du",i:"CM",r:true}],
            lines:[
                {s:0,en:"Good morning — please come in and take a seat. I can see straight away that you are not feeling well at all. Can I take your name and department?",de:"Guten Morgen — bitte kommen Sie herein und setzen Sie sich. Ich sehe sofort, dass es Ihnen gar nicht gut geht. Kann ich Ihren Namen und Ihre Abteilung aufnehmen?",v:["department"]},
                {s:1,en:"My name is Felix, I am an anesthesiologist. I have a high fever — 39.7, severe headaches, muscle and joint pain, and I had rigors — shaking chills — during the night.",de:"Mein Name ist Felix, ich bin Anästhesist. Ich habe hohes Fieber — 39,7, starke Kopfschmerzen, Muskel- und Gelenkschmerzen und hatte nachts Schüttelfrost.",v:["fever","headaches","muscle and joint pain","rigors"]}
            ],
            vocab:["fever","rigors","sweating","malaria","malaria prophylaxis","vital signs","blood film","rapid diagnostic test"],
            tip:"Beschreibe Symptome immer präzise: 'I have had rigors — shaking chills', 'The onset was sudden — within three hours.'"
        }
    ];

    /* ═══════════════════════════════════════════════
       SPACED REPETITION & VOCAB TRAINER
       ═══════════════════════════════════════════════ */
    const STORAGE_KEY = 'mercy_vocab_trainer';

    function loadCards() {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
    }

    function saveCards(cards) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
    }

    function todayStr() {
        return new Date().toISOString().slice(0,10);
    }

    function addVocab(word, context = '') {
        const cards = loadCards();
        const existing = cards.find(c => c.word === word);
        if (existing) {
            if (context && !existing.contexts.includes(context)) {
                existing.contexts.push(context);
            }
        } else {
            cards.push({
                word: word,
                contexts: context ? [context] : [],
                interval: 0,
                easiness: 2.5,
                repetitions: 0,
                nextReview: todayStr(),
                added: todayStr()
            });
        }
        saveCards(cards);
    }

    function getNextCard() {
        const cards = loadCards();
        const today = todayStr();
        return cards.filter(c => c.nextReview <= today)[0] || null;
    }

    function rateCard(quality) {
        const cards = loadCards();
        const today = todayStr();
        const idx = cards.findIndex(c => c.nextReview <= today);
        if (idx === -1) return;

        const card = cards[idx];
        if (quality < 3) {
            card.repetitions = 0;
            card.interval = 1;
        } else {
            card.repetitions += 1;
            if (card.repetitions === 1) card.interval = 1;
            else if (card.repetitions === 2) card.interval = 6;
            else card.interval = Math.round(card.interval * card.easiness);
        }
        card.easiness += (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
        if (card.easiness < 1.3) card.easiness = 1.3;

        const nextDate = new Date();
        nextDate.setDate(nextDate.getDate() + card.interval);
        card.nextReview = nextDate.toISOString().slice(0,10);
        saveCards(cards);
        showTrainerCard();
    }

    function showTrainerCard() {
        const card = getNextCard();
        const cardDiv = document.getElementById('trainerCard');
        const emptyDiv = document.getElementById('trainerEmpty');
        const statsDiv = document.getElementById('trainerStats');
        const allCards = loadCards();
        const dueCount = allCards.filter(c => c.nextReview <= todayStr()).length;
        statsDiv.innerHTML = `📊 ${allCards.length} Vokabeln gespeichert · ${dueCount} heute fällig`;

        if (card) {
            document.getElementById('trainerWord').textContent = card.word;
            document.getElementById('trainerContext').textContent =
                card.contexts.length > 0 ? `Kontext: ${card.contexts.join(' · ')}` : '';
            cardDiv.style.display = 'block';
            emptyDiv.style.display = 'none';

            const btns = cardDiv.querySelectorAll('.trainer-btn');
            btns[0].onclick = () => rateCard(5);
            btns[1].onclick = () => rateCard(3);
            btns[2].onclick = () => rateCard(1);
            btns[3].onclick = () => rateCard(0);
        } else {
            cardDiv.style.display = 'none';
            emptyDiv.style.display = 'block';
        }
    }

    function addSceneVocabToTrainer() {
        if (!currentScene || !currentScene.vocab) return;
        currentScene.vocab.forEach(word => addVocab(word, currentScene.title));

        const btn = document.querySelector('.add-scene-btn');
        if (btn) {
            btn.textContent = '✅ Hinzugefügt!';
            setTimeout(() => { btn.textContent = '📥 Szene-Vokabeln merken'; }, 2000);
        }
        if (document.getElementById('vocabTrainerSection').style.display !== 'none') {
            showTrainerCard();
        }
    }

    function toggleTrainer() {
        const sec = document.getElementById('vocabTrainerSection');
        if (sec.style.display === 'none') {
            sec.style.display = 'block';
            showTrainerCard();
        } else {
            sec.style.display = 'none';
        }
    }

    function exportVocabToMarkdown() {
        const cards = loadCards();
        if (cards.length === 0) {
            alert('Keine Vokabeln zum Exportieren vorhanden.');
            return;
        }

        cards.sort((a, b) => b.added.localeCompare(a.added));
        let md = `# 📚 Mercy Ships Vokabeln – Export\n\n`;
        md += `**Exportiert am:** ${todayStr()}\n`;
        md += `**Anzahl:** ${cards.length} Karten\n\n---\n\n`;
        cards.forEach((card, i) => {
            md += `### ${i+1}. **${card.word}**\n`;
            if (card.contexts.length > 0) {
                md += `- **Kontext:** ${card.contexts.join('; ')}\n`;
            }
            md += `- **Fortschritt:** ${card.repetitions} Wiederholungen\n`;
            md += `- **Nächste Wiederholung:** ${card.nextReview}\n`;
            md += `- **Hinzugefügt am:** ${card.added}\n\n`;
        });

        const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `mercy-vokabeln-${todayStr()}.md`;
        a.click();
        URL.revokeObjectURL(url);
    }

    /* ═══════════════════════════════════════════════
       VERLAUF (HISTORY)
       ═══════════════════════════════════════════════ */
    const HISTORY_KEY = 'mercy_scene_history';

    function saveSceneToHistory(scene) {
        const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        const duplicate = history.findIndex(e => e.title === scene.title && e.cat === scene.cat);
        if (duplicate > -1) history.splice(duplicate, 1);
        history.unshift({
            title: scene.title,
            cat: scene.cat,
            loc: scene.loc,
            date: new Date().toISOString(),
            scene: scene
        });
        if (history.length > 10) history.length = 10;
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function showHistory() {
        const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        const out = document.getElementById('out');
        if (history.length === 0) {
            out.innerHTML = `<div class="empty">
                <div class="empty-icon">📭</div>
                <div class="empty-t">Kein Verlauf vorhanden</div>
                <div class="empty-s">Sobald du Szenen generierst, erscheinen sie hier.</div>
            </div>`;
            document.getElementById('ctr').textContent = '';
            return;
        }

        const listHTML = history.map((entry, i) => `
            <div class="history-item" data-index="${i}" style="
                background:var(--surface);border:1px solid var(--border-light);border-radius:10px;
                padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s;
            " onmouseover="this.style.borderColor='var(--accent)';" onmouseout="this.style.borderColor='var(--border-light)';">
                <div style="font-weight:600;color:var(--text);margin-bottom:2px;">${entry.title}</div>
                <div style="font-size:12px;color:var(--muted);">${entry.cat} · ${entry.loc} · ${new Date(entry.date).toLocaleDateString()}</div>
            </div>
        `).join('');

        out.innerHTML = `
            <div class="card" style="padding:20px 24px;">
                <div class="voc-title" style="margin-bottom:12px;">🕒 Letzte Szenen</div>
                ${listHTML}
            </div>`;

        document.querySelectorAll('.history-item').forEach(item => {
            item.onclick = () => {
                const index = parseInt(item.dataset.index);
                currentScene = history[index].scene;
                showDE = false;
                render();
                document.getElementById('deBtn').classList.add('vis');
                document.getElementById('deBtn').textContent = '🇩🇪 Übersetzung ein/aus';
                document.getElementById('ctr').textContent = `Verlauf – ${currentScene.title}`;
            };
        });
    }

    /* ═══════════════════════════════════════════════
       DASHBOARD
       ═══════════════════════════════════════════════ */
    function loadDashboard() {
        const out = document.getElementById('out');
        const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        const vocabCards = loadCards();
        const today = todayStr();

        const scenesToday = history.filter(h => h.date.slice(0,10) === today).length;
        const newVocabToday = vocabCards.filter(c => c.added === today).length;
        const dueCount = vocabCards.filter(c => c.nextReview <= today).length;

        const streak = calculateStreak(history);

        const catCounts = {};
        history.forEach(h => {
            catCounts[h.cat] = (catCounts[h.cat] || 0) + 1;
        });
        const maxCount = Math.max(1, ...Object.values(catCounts));

        const activities = history.slice(0,3).map(h => ({
            text: `Szene "${h.title}" generiert`,
            date: new Date(h.date)
        }));

        out.innerHTML = `
            <div class="card" style="padding:20px 24px;">
                <div class="voc-title" style="margin-bottom:16px;">🏠 Dashboard</div>
                <div class="dashboard-grid">
                    <div class="dash-card">
                        <div class="dash-label">Heute</div>
                        <div style="display:flex;gap:24px;margin-top:8px;">
                            <div><span class="dash-number">${scenesToday}</span><br><small>Szenen</small></div>
                            <div><span class="dash-number">${newVocabToday}</span><br><small>neue Vokabeln</small></div>
                        </div>
                    </div>
                    <div class="dash-card">
                        <div class="dash-label">Fällige Wiederholungen</div>
                        <span class="dash-number">${dueCount}</span>
                        <button style="margin-top:8px;font-size:12px;" onclick="toggleTrainer()">Jetzt üben →</button>
                    </div>
                    <div class="dash-card">
                        <div class="dash-label">Lern‑Serie</div>
                        <span class="streak-fire">🔥 ${streak}</span> Tag${streak !== 1 ? 'e' : ''} in Folge
                    </div>
                    <div class="dash-card">
                        <div class="dash-label">Themenverteilung</div>
                        ${Object.keys(catCounts).length === 0 ? '<p style="color:var(--muted);">Keine Daten</p>' : 
                            Object.entries(catCounts).map(([cat, count]) => `
                                <div style="margin-bottom:8px;">
                                    <span>${cat}: ${count}</span>
                                    <div class="bar-container"><div class="bar-fill" style="width:${(count/maxCount)*100}%;"></div></div>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
                <div style="margin-top:12px;">
                    <div class="voc-title">⏱️ Letzte Aktivitäten</div>
                    ${activities.length === 0 ? '<p style="color:var(--muted);">Noch keine Aktivitäten</p>' :
                        activities.map(a => `
                            <div class="activity-item">
                                <span>${a.text}</span>
                                <span style="color:var(--faint);">${a.date.toLocaleString()}</span>
                            </div>
                        `).join('')
                    }
                </div>
            </div>`;
    }

    function calculateStreak(history) {
        if (!history.length) return 0;
        const dates = history.map(h => h.date.slice(0,10)).filter((v,i,a) => a.indexOf(v) === i).sort();
        let streak = 0;
        const today = new Date(todayStr());
        if (dates.includes(todayStr()) || dates.includes(new Date(today - 864e5).toISOString().slice(0,10))) {
            streak = 1;
            for (let i = dates.length-1; i > 0; i--) {
                const current = new Date(dates[i]);
                const previous = new Date(dates[i-1]);
                if ((current - previous) / 864e5 === 1) streak++;
                else break;
            }
        }
        return streak;
    }

    /* ═══════════════════════════════════════════════
       API & RENDERING
       ═══════════════════════════════════════════════ */
    async function next() {
        const btn = document.getElementById('genBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="dice">⏳</span> Generiere…';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            if (!response.ok) throw new Error(`API-Fehler ${response.status}`);
            currentScene = await response.json();
            total++;
            saveSceneToHistory(currentScene);
        } catch (error) {
            console.warn('API nicht erreichbar, nutze lokale Szene:', error);
            let ni;
            do { ni = Math.floor(Math.random() * S.length); } while (ni === idx && S.length > 1);
            idx = ni;
            currentScene = S[idx];
            total++;
            saveSceneToHistory(currentScene);
        }

        showDE = false;
        render();
        document.getElementById('deBtn').classList.add('vis');
        document.getElementById('deBtn').textContent = '🇩🇪 Übersetzung ein/aus';
        document.getElementById('ctr').style.display = 'block';
        document.getElementById('ctr').textContent = `Szene #${total} — ${currentScene.title}`;

        btn.disabled = false;
        btn.innerHTML = '🎲 Neue Situation';
    }

    async function nextCustom() {
        const input = document.getElementById('customSceneInput');
        const userPrompt = input.value.trim();
        if (!userPrompt) {
            alert('Bitte eine kurze Beschreibung der gewünschten Situation eingeben.');
            return;
        }

        const btn = document.getElementById('genBtnCustom');
        btn.disabled = true;
        btn.innerHTML = '⏳ Generiere…';

        try {
            const response = await fetch(API_URL + '?custom=true', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: userPrompt })
            });
            if (!response.ok) throw new Error(`API-Fehler ${response.status}`);
            currentScene = await response.json();
            total++;
            saveSceneToHistory(currentScene);
        } catch (error) {
            console.warn('API nicht erreichbar, nutze lokale Szene:', error);
            let ni;
            do { ni = Math.floor(Math.random() * S.length); } while (ni === idx && S.length > 1);
            idx = ni;
            currentScene = S[idx];
            total++;
            saveSceneToHistory(currentScene);
        }

        showDE = false;
        render();
        document.getElementById('deBtn').classList.add('vis');
        document.getElementById('deBtn').textContent = '🇩🇪 Übersetzung ein/aus';
        document.getElementById('ctr').style.display = 'block';
        document.getElementById('ctr').textContent = `Szene #${total} — ${currentScene.title}`;

        btn.disabled = false;
        btn.innerHTML = '✨ Wunschszene';
    }

    function render() {
        const sc = currentScene;
        if (!sc) return;

        const spChips = sc.sp.map((sp, i) =>
            `<div class="sp-chip"><div class="av" style="background:${C[i%C.length]}">${sp.i}</div><span>${sp.n}</span></div>`
        ).join('');

        const lines = sc.lines.map(line => {
            const sp = sc.sp[line.s];
            const col = C[line.s % C.length];
            let en = line.en;
            (line.v || []).forEach(v => {
                const re = new RegExp('(' + v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
                en = en.replace(re, '<mark>$1</mark>');
            });
            return `<div class="lb ${sp.r ? 'r' : ''}">
                <div class="lav" style="background:${col}">${sp.i}</div>
                <div class="lc">
                    <div class="sname">${sp.n}</div>
                    <div class="bub">${en}<div class="bub-de">${line.de}</div></div>
                </div>
            </div>`;
        }).join('');

        const vchips = sc.vocab.map(v => `<span class="chip">${v}</span>`).join('');

        document.getElementById('out').innerHTML = `
            <div class="card">
                <div class="card-head">
                    <div class="tags"><span class="tag">${sc.cat}</span><span class="tag loc">${sc.loc}</span><span class="tag diff">${sc.diff}</span></div>
                    <div class="card-title">${sc.title}</div>
                    <div class="card-desc">${sc.desc}</div>
                    <div class="sp-row">${spChips}</div>
                </div>
                <div class="dialogue">${lines}</div>
                <div class="voc-sec">
                    <div class="voc-title">Schlüsselvokabeln dieser Szene</div>
                    <div class="chips">${vchips}</div>
                    <div class="tip">💡 ${sc.tip}</div>
                </div>
            </div>`;

        setTimeout(() => {
            const vocSec = document.querySelector('.voc-sec');
            if (vocSec && currentScene && currentScene.vocab) {
                const oldBtn = document.querySelector('.add-scene-btn');
                if (oldBtn) oldBtn.remove();

                const addBtn = document.createElement('button');
                addBtn.className = 'add-scene-btn';
                addBtn.textContent = '📥 Szene-Vokabeln merken';
                addBtn.onclick = addSceneVocabToTrainer;
                vocSec.appendChild(addBtn);
            }
        }, 50);
    }

    function toggleDE() {
        showDE = !showDE;
        document.querySelectorAll('.bub-de').forEach(e => e.classList.toggle('on', showDE));
        document.getElementById('deBtn').textContent = showDE ? '🇩🇪 Übersetzung verbergen' : '🇩🇪 Übersetzung ein/aus';
    }

    /* ═══════════════════════════════════════════════
       INITIALISIERUNG
       ═══════════════════════════════════════════════ */
    document.getElementById('genBtn').onclick = next;
    document.getElementById('genBtnCustom').onclick = nextCustom;
    document.getElementById('dashboardBtn').onclick = loadDashboard;
    document.getElementById('historyBtn').onclick = showHistory;
    document.getElementById('deBtn').onclick = toggleDE;
    document.getElementById('vocabBtn').onclick = toggleTrainer;
    document.getElementById('exportMdBtn').onclick = exportVocabToMarkdown;

    // Standardansicht: Dashboard
    loadDashboard();

    // Browser-Benachrichtigung für tägliches Vokabeltraining
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
    function scheduleDailyReminder() {
        const now = new Date();
        const morning = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 8, 0, 0);
        if (now > morning) morning.setDate(morning.getDate() + 1);
        setTimeout(() => {
            const cards = loadCards();
            const due = cards.filter(c => c.nextReview <= todayStr()).length;
            if (due > 0 && Notification.permission === 'granted') {
                new Notification('📚 Mercy English Trainer', {
                    body: `Du hast ${due} Vokabeln zur Wiederholung. Jetzt üben!`,
                });
            }
            scheduleDailyReminder();
        }, morning - now);
    }
    scheduleDailyReminder();
</script>
